<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h1 class="mb-4">
    Gemstone Dashboard
  </h1>

  <div class="row">

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h5>Total Gemstones</h5>
        <h2>120</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h5>Total Customers</h5>
        <h2>45</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h5>Total Sales</h5>
        <h2>$9000</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h5>Inventory</h5>
        <h2>340</h2>
      </div>
    </div>

  </div>

</div>

</body>
</html>
