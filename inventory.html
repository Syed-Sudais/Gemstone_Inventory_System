<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-2 bg-dark text-white vh-100 p-3">
      <h3 class="mb-4">Gemstone System</h3>

      <ul class="nav flex-column">
        <li class="nav-item mb-2"><a href="dashboard.html" class="nav-link text-white">Dashboard</a></li>
        <li class="nav-item mb-2"><a href="gemstones.html" class="nav-link text-white">Gemstones</a></li>
        <li class="nav-item mb-2"><a href="customers.html" class="nav-link text-white">Customers</a></li>
        <li class="nav-item mb-2"><a href="suppliers.html" class="nav-link text-white">Suppliers</a></li>
        <li class="nav-item mb-2"><a href="sales.html" class="nav-link text-white">Sales</a></li>
        <li class="nav-item mb-2"><a href="purchases.html" class="nav-link text-white">Purchases</a></li>
        <li class="nav-item mb-2"><a href="inventory.html" class="nav-link text-white">Inventory</a></li>
        <li class="nav-item mb-2"><a href="categories.html" class="nav-link text-white">Categories</a></li>
      </ul>
    </div>

    <div class="col-md-10 p-4 main-content">

      <div class="d-flex justify-content-between mb-4">
        <h1>Inventory</h1>
        <button class="btn btn-success">Update Stock</button>
      </div>

      <div class="card shadow p-3">

        <table class="table table-bordered table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Gemstone</th>
              <th>Category</th>
              <th>Stock Quantity</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>1</td>
              <td>Ruby</td>
              <td>Precious</td>
              <td>25</td>
              <td><span class="badge bg-success">Available</span></td>
            </tr>

            <tr>
              <td>2</td>
              <td>Sapphire</td>
              <td>Precious</td>
              <td>5</td>
              <td><span class="badge bg-warning text-dark">Low Stock</span></td>
            </tr>
          </tbody>
        </table>

      </div>

    </div>

  </div>
</div>

</body>
</html>
